services:
  db:
    image: postgres:16-alpine
    container_name: tm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-taskmanager}
      POSTGRES_USER: ${DB_USER:-tm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-tm_user} -d ${DB_NAME:-taskmanager}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery:
    build: ./backend
    container_name: tm_celery
    command: celery -A config worker --loglevel=info --concurrency=2 --max-tasks-per-child=1000
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=${DEBUG:-1}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-in-prod}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-taskmanager}
      - DB_USER=${DB_USER:-tm_user}
      - DB_PASSWORD=${DB_PASSWORD:-supersecret}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./backend
    container_name: tm_api
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-1}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-in-prod}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-taskmanager}
      - DB_USER=${DB_USER:-tm_user}
      - DB_PASSWORD=${DB_PASSWORD:-supersecret}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
